<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archive of amad</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <div class="page-shell">

	<section class="hero archive-hero" id="home">
	  <div class="archive-hero-inner">

		<h1 class="archive-hero-title">
		  hello and welcome to the mind of <span class="archive-name-glow">amad ilyas</span>
		</h1>

		<div class="archive-hero-cluster">

		  <div class="archive-orbit"></div>

		  <div class="archive-label archive-label-top">
			<button class="archive-ball" type="button" aria-label="Toggle top title"></button>
			<span class="archive-label-text">title</span>
		  </div>

		  <div class="archive-label archive-label-left">
			<span class="archive-label-text">title</span>
			<button class="archive-ball" type="button" aria-label="Toggle left title"></button>
		  </div>

		  <div class="archive-label archive-label-right">
			<span class="archive-label-text">title</span>
			<button class="archive-ball" type="button" aria-label="Toggle right title"></button>
		  </div>

		  <div class="archive-label archive-label-bottom">
			<button class="archive-ball" type="button" aria-label="Toggle bottom title"></button>
			<span class="archive-label-text">title</span>
		  </div>

		  <div class="hero-player archive-player-live">
			<div class="player-device">
			  <div class="art-frame">
				<div class="art-image" aria-hidden="true"></div>
				<div class="art-bubble-overlay" aria-hidden="true"></div>
			  </div>

			  <div class="lcd-wrap">
				<div class="lcd">
				  <div class="lcd-content">
					<div class="lcd-world" aria-hidden="true"></div>

					<div class="lcd-pet-wrap" aria-hidden="true">
					  <div class="lcd-pet" id="lcdPet">
						<img
						  src="https://raw.githubusercontent.com/amadmoney/amadilyas/79338268cda6cd8c6879210a455b33b21f1c0ab6/images/MAMETCHI_SPRITE.svg"
						  id="lcdPetImg"
						  alt=""
						  aria-hidden="true"
						/>
					  </div>
					  <div class="lcd-pet-shadow"></div>
					  <div class="lcd-pet-ground"></div>
					</div>

					<div class="lcd-ui">
					  <div class="lcd-top">
						<span>MP3</span>
						<span id="trackCount">1/3</span>
					  </div>

					  <div class="lcd-track" id="trackTitle">
						<span class="lcd-track-text" id="trackTitleText">TRACK ONE</span>
					  </div>

					  <div class="lcd-artist" id="trackArtist">ARTIST ONE</div>

					  <div class="lcd-eq" aria-hidden="true">
						<span></span>
						<span></span>
						<span></span>
						<span></span>
						<span></span>
					  </div>

					  <div
						class="lcd-bar"
						id="progressBar"
						aria-label="Track progress"
						role="slider"
						tabindex="0"
						aria-valuemin="0"
						aria-valuemax="100"
						aria-valuenow="0"
					  >
						<div class="lcd-bar-fill" id="progressFill"></div>
						<div class="lcd-bar-thumb" id="progressThumb"></div>
					  </div>

					  <div class="lcd-time">
						<span id="currentTime">0:00</span>
						<span id="duration">0:00</span>
					  </div>
					</div>
				  </div>
				</div>
			  </div>

			  <div class="control-pod-wrap">
				<div class="pod-lip" aria-hidden="true"></div>
				<div class="pod-well pod-well-plus" aria-hidden="true"></div>
				<div class="pod-well pod-well-next" aria-hidden="true"></div>
				<div class="pod-well pod-well-play" aria-hidden="true"></div>
				<div class="pod-well pod-well-prev" aria-hidden="true"></div>
				<div class="pod-well pod-well-minus" aria-hidden="true"></div>
				<div class="pod-well pod-well-mute" aria-hidden="true"></div>

				<button class="pod-btn pod-plus" id="volUpBtn" type="button" aria-label="Volume up">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/8000217d27783ba6002b8d7cdeb27b1502a003e2/icons/plus-solid-full.svg"
					class="pod-icon"
					alt=""
					aria-hidden="true"
				  />
				</button>

				<button class="pod-btn pod-next" id="nextBtn" type="button" aria-label="Next track">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/8000217d27783ba6002b8d7cdeb27b1502a003e2/icons/forward-solid-full.svg"
					class="pod-icon"
					alt=""
					aria-hidden="true"
				  />
				</button>

				<button class="pod-btn pod-play" id="playBtn" type="button" aria-label="Play or pause">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/8000217d27783ba6002b8d7cdeb27b1502a003e2/icons/play-solid-full.svg"
					class="pod-icon pod-icon-play"
					alt=""
					aria-hidden="true"
				  />
				</button>

				<button class="pod-btn pod-prev" id="prevBtn" type="button" aria-label="Previous track">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/8000217d27783ba6002b8d7cdeb27b1502a003e2/icons/forward-solid-full.svg"
					class="pod-icon pod-icon-flip"
					alt=""
					aria-hidden="true"
				  />
				</button>

				<button class="pod-btn pod-minus" id="volDownBtn" type="button" aria-label="Volume down">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/8000217d27783ba6002b8d7cdeb27b1502a003e2/icons/minus-solid-full.svg"
					class="pod-icon"
					alt=""
					aria-hidden="true"
				  />
				</button>

				<button class="pod-btn pod-mute" id="muteBtn" type="button" aria-label="Mute">
				  <img
					src="https://raw.githubusercontent.com/amadmoney/amadilyas/934d11b9a53b22a6d5b25fe4d6f1947c28e0bd2c/icons/mute-solid-full.svg"
					class="pod-icon pod-icon-mute"
					alt=""
					aria-hidden="true"
				  />
				</button>
			  </div>

			  <div class="side-wheel" aria-hidden="true"></div>

			  <audio id="audio" preload="metadata"></audio>
			</div>
		  </div>
		</div>

		<p class="archive-hero-copy">
		  creative director and interdisciplinary artist blending imagination,
		  oddity, and nostalgia into unexpected results
		</p>

	  </div>
	</section>

  </div>

  <script src="home.js"></script>
</body>
</html>
