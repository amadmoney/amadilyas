<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archive of amad</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      /* page */
      --page-pad-x: 72px;

      /* floating player positioning */
      --player-width: 360px;
      --player-overlap: 95px;
      --player-left: 66%;

      /* player shell */
      --shell-bg: #efefef;
      --shell-border: #d5d5d5;
      --shell-shadow: 0 18px 40px rgba(0,0,0,0.32);
      --shell-radius: 22px;

      /* screen */
      --screen-bg: #8d9a84;
      --screen-border: #5a6771;

      /* buttons */
      --btn-bg: #fafafa;
      --btn-border: #5d77a8;
      --btn-icon: #3f5f95;

      /* sticker colours */
      --accent-yellow: #ffd84c;
      --accent-orange: #ff9b30;
      --accent-green: #6cff4f;
      --accent-blue: #59c7ff;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .page-shell {
      position: relative;
    }

    .top-section {
      min-height: 100vh;
      background: #000;
      padding: 56px var(--page-pad-x) 150px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
      z-index: 1;
    }

    .top-nav {
      display: flex;
      gap: 48px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 170px;
    }

    .top-nav a {
      color: #00eaff;
      text-decoration: none;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      transition: opacity 0.2s ease;
    }

    .top-nav a:hover {
      opacity: 0.75;
    }

    .hero-copy {
      max-width: 860px;
    }

    .hero-copy p {
      margin: 0;
      font-size: 64px;
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .hero-copy .line {
      display: block;
      margin-bottom: 8px;
    }

    .rainbow {
      font-weight: 700;
      background: linear-gradient(
        90deg,
        #78ff00 0%,
        #ffb300 18%,
        #ff5a00 34%,
        #ff33b8 50%,
        #7a3cff 66%,
        #2b6dff 82%,
        #00eaff 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .white-line {
      color: #ffffff;
      font-weight: 400;
    }

    .gradient-section {
      min-height: 100vh;
      padding: 180px var(--page-pad-x) 80px;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,230,170,.95) 0%, rgba(255,230,170,.45) 10%, rgba(255,230,170,0) 28%),
        radial-gradient(circle at 82% 14%, rgba(177,168,255,.95) 0%, rgba(177,168,255,.5) 12%, rgba(177,168,255,0) 30%),
        radial-gradient(circle at 52% 78%, rgba(255,196,160,.38) 0%, rgba(255,196,160,.18) 16%, rgba(255,196,160,0) 36%),
        linear-gradient(
          to bottom,
          #8f88cc 0%,
          #a493d2 16%,
          #b69dd1 32%,
          #c9a7cf 48%,
          #dfb3ca 66%,
          #efc1bf 84%,
          #f4c9b8 100%
        );
    }

    .gradient-placeholder {
      color: rgba(255,255,255,0.9);
      font-size: 24px;
      font-weight: 700;
    }

    /* =========================
       FLOATING TAMAGOTCHI-LIKE PLAYER
    ========================= */
    .floating-player {
      position: absolute;
      left: var(--player-left);
      top: calc(100vh - var(--player-overlap));
      transform: translateX(-50%) rotate(-3deg);
      width: var(--player-width);
      z-index: 50;
      pointer-events: none;
    }

    .player-device {
      position: relative;
      width: 100%;
      aspect-ratio: 1.66 / 1;
      background: var(--shell-bg);
      border: 2px solid var(--shell-border);
      border-radius: var(--shell-radius);
      box-shadow: var(--shell-shadow);
      overflow: hidden;
      pointer-events: auto;
    }

    .player-device::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.65), rgba(255,255,255,0) 28%),
        linear-gradient(145deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 55%);
      pointer-events: none;
    }

    .speaker-ring {
      position: absolute;
      right: 14px;
      top: 50%;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: linear-gradient(145deg, #fdfdfd, #d9d9d9);
      border: 2px solid #c8c8c8;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.7);
    }

    .speaker-ring::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ebebeb, #cfcfcf);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.75);
    }

    .sticker-strip {
      position: absolute;
      left: 32px;
      top: 10px;
      width: 185px;
      height: 32px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 12% 50%, rgba(255,222,92,1) 0 9px, transparent 10px),
        radial-gradient(circle at 34% 40%, rgba(89,199,255,1) 0 8px, transparent 9px),
        radial-gradient(circle at 58% 55%, rgba(108,255,79,1) 0 9px, transparent 10px),
        linear-gradient(90deg, #fff3a6 0%, #fff 22%, #cff6ff 55%, #ffe8a0 100%);
      border: 2px solid rgba(255,255,255,0.8);
      transform: rotate(1deg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5b68b8;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255,255,255,0.65);
    }

    .sticker-corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(0,0,0,0.16);
      border: 2px solid rgba(0,0,0,0.08);
    }

    .sticker-top-left {
      left: 8px;
      top: 8px;
      background: #ffe882;
      transform: rotate(-16deg);
    }

    .sticker-bottom-left {
      left: 10px;
      bottom: 10px;
      background: #ffbb63;
      transform: rotate(12deg);
    }

    .sticker-bottom-mid {
      left: 150px;
      bottom: 8px;
      background: #7cff58;
      transform: rotate(-8deg);
    }

    .lcd-wrap {
      position: absolute;
      left: 56px;
      top: 52px;
      width: 150px;
      height: 72px;
      border-radius: 9px;
      padding: 4px;
      background: linear-gradient(145deg, #2b3540, #778290);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.18),
        0 2px 10px rgba(0,0,0,0.22);
    }

    .lcd {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 6px;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
        var(--screen-bg);
      color: #223128;
    }

    .lcd::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0.08) 0px,
          rgba(0,0,0,0.08) 1px,
          rgba(255,255,255,0.04) 2px,
          rgba(255,255,255,0.04) 3px
        );
      pointer-events: none;
      opacity: 0.55;
    }

    .lcd-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: "Courier New", monospace;
    }

    .lcd-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 9px;
      line-height: 1;
      opacity: 0.8;
    }

    .lcd-track {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lcd-artist {
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.85;
      margin-top: 2px;
    }

    .lcd-bar {
      height: 8px;
      border: 1px solid rgba(34,49,40,0.35);
      background: rgba(255,255,255,0.18);
      position: relative;
      overflow: hidden;
    }

    .lcd-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: rgba(34,49,40,0.7);
    }

    .lcd-time {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      margin-top: 4px;
    }

    .controls-pad {
      position: absolute;
      right: 56px;
      top: 38px;
      width: 92px;
      height: 92px;
      border-radius: 40px;
      background: linear-gradient(145deg, #fff, #ededed);
      border: 2px solid var(--btn-border);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,0.8),
        0 5px 10px rgba(0,0,0,0.12);
    }

    .control-btn {
      position: absolute;
      border: none;
      background: transparent;
      color: var(--btn-icon);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .control-btn:hover {
      transform: scale(1.06);
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .btn-play {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--btn-border);
      display: grid;
      place-items: center;
      font-size: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn-prev {
      left: 20px;
      top: 39px;
    }

    .btn-next {
      right: 20px;
      top: 39px;
    }

    .btn-menu {
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      font-size: 9px;
      text-transform: lowercase;
      letter-spacing: 0.2px;
    }

    .btn-top {
      left: 50%;
      top: 12px;
      transform: translateX(-50%) rotate(-45deg);
      font-size: 12px;
    }

    .mini-hole {
      position: absolute;
      left: 80px;
      top: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(145deg, #dae9ee, #f7f7f7);
      border: 2px solid #d9d9d9;
    }

    .audio-hidden {
      display: none;
    }

    /* mobile */
    @media (max-width: 1100px) {
      .hero-copy p {
        font-size: 52px;
      }

      .top-nav {
        margin-bottom: 130px;
      }

      .floating-player {
        left: 72%;
      }
    }

    @media (max-width: 768px) {
      :root {
        --page-pad-x: 24px;
        --player-width: 300px;
        --player-overlap: 86px;
        --player-left: 50%;
      }

      .top-section,
      .gradient-section {
        padding-left: var(--page-pad-x);
        padding-right: var(--page-pad-x);
      }

      .top-section {
        padding-top: 32px;
        padding-bottom: 130px;
      }

      .gradient-section {
        padding-top: 140px;
      }

      .top-nav {
        gap: 24px;
        margin-bottom: 90px;
      }

      .top-nav a {
        font-size: 22px;
      }

      .hero-copy p {
        font-size: 38px;
        line-height: 1.16;
      }

      .floating-player {
        transform: translateX(-50%) rotate(-2deg);
      }

      .lcd-wrap {
        left: 44px;
        top: 44px;
        width: 126px;
        height: 62px;
      }

      .controls-pad {
        right: 44px;
        top: 32px;
        width: 82px;
        height: 82px;
      }

      .speaker-ring {
        width: 46px;
        height: 46px;
        right: 10px;
      }

      .sticker-strip {
        left: 26px;
        width: 155px;
        height: 28px;
        font-size: 11px;
      }

      .sticker-bottom-mid {
        left: 128px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --player-width: 270px;
      }

      .top-nav {
        gap: 18px 20px;
        margin-bottom: 72px;
      }

      .top-nav a {
        font-size: 18px;
      }

      .hero-copy p {
        font-size: 30px;
      }

      .lcd-wrap {
        left: 38px;
        top: 42px;
        width: 112px;
        height: 56px;
      }

      .controls-pad {
        right: 38px;
        top: 30px;
        width: 74px;
        height: 74px;
      }

      .btn-prev,
      .btn-next {
        top: 31px;
      }

      .btn-prev {
        left: 17px;
      }

      .btn-next {
        right: 17px;
      }

      .btn-menu {
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">

    <section class="top-section">
      <nav class="top-nav">
        <a href="#">Home</a>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>

      <div class="hero-copy">
        <p>
          <span class="line rainbow">Creative and Art Direction for the</span>
          <span class="line">
            <span class="rainbow">global majority</span>
            <span class="white-line"> that taps into</span>
          </span>
          <span class="line white-line">imagination, curiousity and nostalgia</span>
          <span class="line white-line">while always looking ahead at whats next.</span>
        </p>
      </div>
    </section>

    <!-- FLOATING PLAYER -->
    <div class="floating-player">
      <div class="player-device">
        <div class="sticker-strip">TWMGC</div>
        <div class="sticker-corner sticker-top-left">☻</div>
        <div class="sticker-corner sticker-bottom-left">✦</div>
        <div class="sticker-corner sticker-bottom-mid">♬</div>
        <div class="mini-hole"></div>

        <div class="lcd-wrap">
          <div class="lcd">
            <div class="lcd-content">
              <div class="lcd-top">
                <span>MP3</span>
                <span id="trackCount">1/3</span>
              </div>

              <div>
                <div class="lcd-track" id="trackTitle">Track One</div>
                <div class="lcd-artist" id="trackArtist">Artist One</div>
              </div>

              <div>
                <div class="lcd-bar">
                  <div class="lcd-bar-fill" id="progressFill"></div>
                </div>
                <div class="lcd-time">
                  <span id="currentTime">0:00</span>
                  <span id="duration">0:00</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="controls-pad">
          <button class="control-btn btn-top" id="topBtn" type="button">✕</button>
          <button class="control-btn btn-prev" id="prevBtn" type="button">◄</button>
          <button class="control-btn btn-play" id="playBtn" type="button">▶</button>
          <button class="control-btn btn-next" id="nextBtn" type="button">►</button>
          <button class="control-btn btn-menu" id="menuBtn" type="button">menu</button>
        </div>

        <div class="speaker-ring"></div>

        <audio id="audio" class="audio-hidden" preload="metadata"></audio>
      </div>
    </div>

    <section class="gradient-section">
      <div class="gradient-placeholder">
        Gradient/archive section goes here next
      </div>
    </section>

  </div>

  <script>
    const playlist = [
      {
        title: "Track One",
        artist: "Artist One",
        audio: "music/track-01.mp3"
      },
      {
        title: "Track Two",
        artist: "Artist Two",
        audio: "music/track-02.mp3"
      },
      {
        title: "Track Three",
        artist: "Artist Three",
        audio: "music/track-03.mp3"
      }
    ];

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const trackTitle = document.getElementById("trackTitle");
    const trackArtist = document.getElementById("trackArtist");
    const trackCount = document.getElementById("trackCount");
    const progressFill = document.getElementById("progressFill");
    const currentTime = document.getElementById("currentTime");
    const duration = document.getElementById("duration");

    let currentTrackIndex = 0;

    function formatTime(time) {
      if (!isFinite(time)) return "0:00";
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins}:${secs.toString().padStart(2, "0")}`;
    }

    function updatePlayButton() {
      playBtn.textContent = audio.paused ? "▶" : "❚❚";
    }

    function loadTrack(index, autoplay = false) {
      currentTrackIndex = index;
      const track = playlist[currentTrackIndex];

      trackTitle.textContent = track.title;
      trackArtist.textContent = track.artist;
      trackCount.textContent = `${currentTrackIndex + 1}/${playlist.length}`;

      audio.src = track.audio;
      audio.load();

      currentTime.textContent = "0:00";
      duration.textContent = "0:00";
      progressFill.style.width = "0%";

      if (autoplay) {
        const p = audio.play();
        if (p) {
          p.then(updatePlayButton).catch(updatePlayButton);
        }
      } else {
        updatePlayButton();
      }
    }

    playBtn.addEventListener("click", async () => {
      if (!audio.src) return;

      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (err) {
        console.error(err);
      }

      updatePlayButton();
    });

    prevBtn.addEventListener("click", () => {
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    nextBtn.addEventListener("click", () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    audio.addEventListener("loadedmetadata", () => {
      duration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      currentTime.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener("play", updatePlayButton);
    audio.addEventListener("pause", updatePlayButton);

    audio.addEventListener("ended", () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    loadTrack(0, false);
  </script>
</body>
</html>
