<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Player Inline Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <nav class="top-nav">
        <a href="#">Home</a>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>

      <div class="hero-copy">
        <p>
          <span class="line rainbow">Creative and Art Direction for the</span>
          <span class="line">
            <span class="rainbow">global majority</span>
            <span class="white-line"> that taps into</span>
          </span>
          <span class="line white-line">imagination, curiousity and nostalgia</span>
          <span class="line white-line">while always looking ahead at whats next.</span>
        </p>
      </div>
    </section>

    <div class="floating-player" id="floatingPlayer">
      <div class="player-tilt" id="playerTilt">
        <div class="player-device">
          <div class="art-frame">
            <img
              class="art-image"
              src="images/sticker-frame.png"
              alt=""
            />
          </div>

          <div class="lcd-wrap">
            <div class="lcd">
              <div class="lcd-content">
                <div class="lcd-top">
                  <span>MP3</span>
                  <span id="trackCount">1/3</span>
                </div>

                <div class="lcd-track" id="trackTitle">TRACK ONE</div>
                <div class="lcd-artist" id="trackArtist">ARTIST ONE</div>

                <div class="lcd-eq" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>

                <div class="lcd-bar">
                  <div class="lcd-bar-fill" id="progressFill"></div>
                </div>

                <div class="lcd-time">
                  <span id="currentTime">0:00</span>
                  <span id="duration">0:00</span>
                </div>
              </div>
            </div>
          </div>

          <div class="control-pod-wrap">
            <div class="control-pod">
              <button class="control-btn btn-plus" id="volUpBtn" type="button" aria-label="Volume up">
                <i class="fa-solid fa-xmark"></i>
              </button>

              <button class="control-btn btn-next" id="nextBtn" type="button" aria-label="Next track">
                <i class="fa-solid fa-forward-step"></i>
              </button>

              <button class="control-btn btn-play" id="playBtn" type="button" aria-label="Play or pause">
                <i class="fa-solid fa-play"></i>
              </button>

              <button class="control-btn btn-prev" id="prevBtn" type="button" aria-label="Previous track">
                <i class="fa-solid fa-backward-step"></i>
              </button>

              <button class="control-btn btn-minus" id="volDownBtn" type="button" aria-label="Volume down">
                <i class="fa-solid fa-minus"></i>
              </button>
            </div>

            <div class="control-pod-bump">
              <button class="control-btn btn-mute" id="muteBtn" type="button" aria-label="Mute">
                mute
              </button>
            </div>
          </div>

          <div class="side-wheel"></div>

          <audio id="audio" preload="metadata"></audio>
        </div>
      </div>
    </div>

    <section class="gradient">
      <h2>Gradient/archive section goes here next</h2>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
