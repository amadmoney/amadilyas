<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Player Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    :root {
      --player-width: 560px;
      --player-left: 61%;
      --player-overlap: 118px;

      --screen-color: #ff4fd8;
      --screen-text: #2d1030;

      --shell-bg: #f3f2f6;
      --shell-border: #d9d7dc;
      --shell-radius: 28px;

      --pod-border: #4767ad;
      --pod-fill-top: #f9fcfd;
      --pod-fill-bottom: #edf3f7;
      --pod-icon: #34579f;

      --wheel-border: #d7d6dc;

      --hero-pad-x: 72px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    .page-shell {
      position: relative;
    }

    .hero {
      min-height: 100vh;
      padding: 56px var(--hero-pad-x) 160px;
      background: #000;
      position: relative;
      z-index: 1;
    }

    .top-nav {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      margin-bottom: 160px;
    }

    .top-nav a {
      color: #09ecff;
      text-decoration: none;
      font-size: 28px;
      font-weight: 700;
    }

    .hero-copy {
      max-width: 920px;
    }

    .hero-copy p {
      margin: 0;
      font-size: 64px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .line {
      display: block;
      margin-bottom: 8px;
    }

    .rainbow {
      font-weight: 700;
      background: linear-gradient(
        90deg,
        #78ff00 0%,
        #ffb300 18%,
        #ff5a00 34%,
        #ff33b8 50%,
        #7a3cff 66%,
        #2b6dff 82%,
        #00eaff 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .white-line {
      color: #fff;
      font-weight: 400;
    }

    .gradient {
      min-height: 100vh;
      padding: 190px var(--hero-pad-x) 80px;
      position: relative;
      z-index: 1;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,230,170,.95) 0%, rgba(255,230,170,.45) 10%, rgba(255,230,170,0) 28%),
        radial-gradient(circle at 82% 14%, rgba(177,168,255,.95) 0%, rgba(177,168,255,.5) 12%, rgba(177,168,255,0) 30%),
        radial-gradient(circle at 52% 78%, rgba(255,196,160,.38) 0%, rgba(255,196,160,.18) 16%, rgba(255,196,160,0) 36%),
        linear-gradient(
          to bottom,
          #8f88cc 0%,
          #a493d2 16%,
          #b69dd1 32%,
          #c9a7cf 48%,
          #dfb3ca 66%,
          #efc1bf 84%,
          #f4c9b8 100%
        );
    }

    .gradient h2 {
      margin: 0;
      font-size: 28px;
      color: rgba(255,255,255,.9);
    }

    /* floating player */
    .floating-player {
      position: absolute;
      top: calc(100vh - var(--player-overlap));
      left: var(--player-left);
      transform: translateX(-50%) rotate(-2deg);
      width: min(var(--player-width), calc(100vw - 32px));
      z-index: 1000;
      perspective: 1200px;
      pointer-events: none;
    }

    .player-tilt {
      transform-style: preserve-3d;
      transition: transform 160ms ease;
      will-change: transform;
      pointer-events: auto;
    }

    .player-device {
      position: relative;
      width: 100%;
      aspect-ratio: 1.88 / 1;
      background: linear-gradient(180deg, #f7f6f8 0%, #edeaf0 100%);
      border: 2px solid var(--shell-border);
      border-radius: var(--shell-radius);
      box-shadow:
        0 22px 40px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.8);
      overflow: hidden;
    }

    .player-device::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,.7), rgba(255,255,255,0) 20%),
        linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,0) 42%);
      pointer-events: none;
      z-index: 1;
    }

    .player-device::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        rgba(255,255,255,0) 35%,
        rgba(255,255,255,.08) 48%,
        rgba(255,255,255,0) 60%
      );
      transform: translateX(-120%);
      animation: shellShine 6.5s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes shellShine {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    /* sticker art frame */
    .art-frame {
      position: absolute;
      left: 14px;
      top: 12px;
      width: 69%;
      height: 79%;
      border-radius: 18px;
      overflow: hidden;
      z-index: 2;
      background: #d8edff;
    }

    .art-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
    }

    /* lcd */
    .lcd-wrap {
      position: absolute;
      left: 9.4%;
      top: 34.5%;
      width: 37.5%;
      height: 38.5%;
      border-radius: 10px;
      padding: 5px;
      background: linear-gradient(145deg, #66757d, #46535a);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.18),
        0 2px 8px rgba(0,0,0,.22);
      z-index: 4;
    }

    .lcd {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 6px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.05), rgba(255,255,255,0)),
        var(--screen-color);
      color: var(--screen-text);
      font-family: "Press Start 2P", monospace;
      box-shadow:
        inset 0 0 24px rgba(255,255,255,.18),
        inset 0 0 28px rgba(255,0,180,.18),
        0 0 18px rgba(255,70,210,.26);
      animation: screenPulse 3.4s ease-in-out infinite;
    }

    @keyframes screenPulse {
      0%, 100% {
        box-shadow:
          inset 0 0 24px rgba(255,255,255,.18),
          inset 0 0 28px rgba(255,0,180,.18),
          0 0 18px rgba(255,70,210,.22);
      }
      50% {
        box-shadow:
          inset 0 0 28px rgba(255,255,255,.22),
          inset 0 0 34px rgba(255,0,180,.24),
          0 0 28px rgba(255,70,210,.34);
      }
    }

    .lcd::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.14), rgba(255,255,255,0) 26%),
        repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,.08) 0px,
          rgba(0,0,0,.08) 1px,
          rgba(255,255,255,.04) 2px,
          rgba(255,255,255,.04) 3px
        );
      opacity: .6;
      pointer-events: none;
      z-index: 1;
    }

    .lcd-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 7px 8px 6px;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 4px;
    }

    .lcd-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 7px;
      line-height: 1;
      opacity: .9;
    }

    .lcd-track {
      font-size: 10px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lcd-artist {
      font-size: 8px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: .88;
    }

    .lcd-eq {
      display: flex;
      align-items: end;
      gap: 3px;
      height: 18px;
      margin-top: 1px;
    }

    .lcd-eq span {
      display: block;
      width: 6px;
      background: rgba(45,16,48,.75);
      animation: eqBounce 900ms ease-in-out infinite;
      transform-origin: bottom;
    }

    .lcd-eq span:nth-child(1) { height: 20%; animation-delay: 0ms; }
    .lcd-eq span:nth-child(2) { height: 60%; animation-delay: 120ms; }
    .lcd-eq span:nth-child(3) { height: 35%; animation-delay: 240ms; }
    .lcd-eq span:nth-child(4) { height: 80%; animation-delay: 360ms; }
    .lcd-eq span:nth-child(5) { height: 28%; animation-delay: 480ms; }

    @keyframes eqBounce {
      0%, 100% { transform: scaleY(.45); }
      50% { transform: scaleY(1); }
    }

    .lcd-bar {
      position: relative;
      height: 8px;
      border: 1px solid rgba(45,16,48,.36);
      background: rgba(255,255,255,.16);
      overflow: hidden;
    }

    .lcd-bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: rgba(45,16,48,.76);
    }

    .lcd-time {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 7px;
      line-height: 1;
    }

    /* exact-ish control silhouette */
    .control-pod {
      position: absolute;
      right: 15.5%;
      top: 22.8%;
      width: 31%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, var(--pod-fill-top) 0%, var(--pod-fill-bottom) 100%);
      border: 3px solid var(--pod-border);
      box-shadow:
        inset 0 2px 3px rgba(255,255,255,.92),
        0 5px 10px rgba(0,0,0,.10);
      z-index: 5;

      clip-path: path("M 91 6
        C 126 6, 157 31, 165 63
        C 176 63, 186 71, 186 86
        C 186 102, 176 111, 164 111
        C 164 141, 146 162, 116 171
        C 108 189, 94 199, 73 199
        C 51 199, 38 188, 31 171
        C 12 165, 0 148, 0 126
        C 0 108, 8 94, 20 85
        C 8 68, 6 50, 16 31
        C 29 13, 51 6, 91 6 Z");
    }

    .control-pod::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 31%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(169, 214, 250, 0.52);
      pointer-events: none;
    }

    .control-pod::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,0) 35%);
      pointer-events: none;
    }

    .side-wheel {
      position: absolute;
      right: 3.55%;
      top: 35.4%;
      width: 15.5%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffffff 0%, #ececf0 100%);
      border: 4px solid var(--wheel-border);
      box-shadow:
        inset 0 2px 3px rgba(255,255,255,.95),
        0 3px 8px rgba(0,0,0,.08);
      z-index: 4;
    }

    .side-wheel::before {
      content: "";
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      background: linear-gradient(180deg, #f5f5f8 0%, #e7e7eb 100%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.9);
    }

    .control-btn {
      position: absolute;
      border: none;
      background: transparent;
      color: var(--pod-icon);
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: grid;
      place-items: center;
      transition: transform .14s ease, opacity .14s ease;
    }

    .control-btn i {
      pointer-events: none;
    }

    .control-btn:hover {
      transform: translate(-50%, -50%) scale(1.06);
    }

    .control-btn:active {
      transform: translate(-50%, -50%) scale(.96);
    }

    .btn-plus {
      left: 34%;
      top: 31%;
      font-size: 16px;
    }

    .btn-next {
      left: 72%;
      top: 35%;
      font-size: 18px;
    }

    .btn-play {
      left: 50%;
      top: 50%;
      width: 31%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(169,214,250,.4);
      font-size: 18px;
      color: var(--pod-icon);
    }

    .btn-play:hover {
      transform: translate(-50%, -50%) scale(1.06);
    }

    .btn-play:active {
      transform: translate(-50%, -50%) scale(.96);
    }

    .btn-prev {
      left: 28%;
      top: 68%;
      font-size: 18px;
    }

    .btn-minus {
      left: 68%;
      top: 69%;
      font-size: 18px;
    }

    .btn-mute {
      left: 49%;
      top: 84%;
      transform: translate(-50%, -50%) rotate(-34deg);
      font-size: 11px;
      font-weight: 700;
      color: #6876a1;
      letter-spacing: .2px;
      text-transform: lowercase;
    }

    .btn-mute:hover {
      transform: translate(-50%, -50%) rotate(-34deg) scale(1.04);
    }

    .btn-mute:active {
      transform: translate(-50%, -50%) rotate(-34deg) scale(.96);
    }

    audio {
      display: none;
    }

    @media (max-width: 1100px) {
      .hero-copy p {
        font-size: 52px;
      }

      .top-nav {
        margin-bottom: 130px;
      }

      .floating-player {
        left: 58%;
      }
    }

    @media (max-width: 768px) {
      :root {
        --player-width: 360px;
        --player-left: 50%;
        --player-overlap: 92px;
        --hero-pad-x: 24px;
      }

      .hero {
        padding-top: 32px;
        padding-bottom: 130px;
      }

      .gradient {
        padding-top: 140px;
      }

      .top-nav {
        gap: 24px;
        margin-bottom: 90px;
      }

      .top-nav a {
        font-size: 22px;
      }

      .hero-copy p {
        font-size: 38px;
        line-height: 1.16;
      }

      .floating-player {
        transform: translateX(-50%) rotate(-1deg);
      }

      .lcd-track {
        font-size: 8px;
      }

      .lcd-artist {
        font-size: 7px;
      }

      .lcd-top,
      .lcd-time {
        font-size: 6px;
      }

      .lcd-eq span {
        width: 4px;
      }

      .btn-plus,
      .btn-next,
      .btn-prev,
      .btn-minus {
        font-size: 13px;
      }

      .btn-play {
        font-size: 14px;
      }

      .btn-mute {
        font-size: 8px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --player-width: 305px;
        --player-overlap: 82px;
      }

      .top-nav {
        gap: 18px 20px;
        margin-bottom: 72px;
      }

      .top-nav a {
        font-size: 18px;
      }

      .hero-copy p {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <nav class="top-nav">
        <a href="#">Home</a>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>

      <div class="hero-copy">
        <p>
          <span class="line rainbow">Creative and Art Direction for the</span>
          <span class="line">
            <span class="rainbow">global majority</span>
            <span class="white-line"> that taps into</span>
          </span>
          <span class="line white-line">imagination, curiousity and nostalgia</span>
          <span class="line white-line">while always looking ahead at whats next.</span>
        </p>
      </div>
    </section>

    <div class="floating-player" id="floatingPlayer">
      <div class="player-tilt" id="playerTilt">
        <div class="player-device">
          <div class="art-frame">
            <!-- swap this image path for your own sticker art -->
            <img
              class="art-image"
              src="images/sticker-frame.png"
              alt=""
            />
          </div>

          <div class="lcd-wrap">
            <div class="lcd">
              <div class="lcd-content">
                <div class="lcd-top">
                  <span>MP3</span>
                  <span id="trackCount">1/3</span>
                </div>

                <div class="lcd-track" id="trackTitle">TRACK ONE</div>
                <div class="lcd-artist" id="trackArtist">ARTIST ONE</div>

                <div class="lcd-eq" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>

                <div class="lcd-bar">
                  <div class="lcd-bar-fill" id="progressFill"></div>
                </div>

                <div class="lcd-time">
                  <span id="currentTime">0:00</span>
                  <span id="duration">0:00</span>
                </div>
              </div>
            </div>
          </div>

          <div class="control-pod">
            <button class="control-btn btn-plus" id="volUpBtn" type="button" aria-label="Volume up">
              <i class="fa-solid fa-xmark"></i>
            </button>

            <button class="control-btn btn-next" id="nextBtn" type="button" aria-label="Next track">
              <i class="fa-solid fa-forward-step"></i>
            </button>

            <button class="control-btn btn-play" id="playBtn" type="button" aria-label="Play or pause">
              <i class="fa-solid fa-play"></i>
            </button>

            <button class="control-btn btn-prev" id="prevBtn" type="button" aria-label="Previous track">
              <i class="fa-solid fa-backward-step"></i>
            </button>

            <button class="control-btn btn-minus" id="volDownBtn" type="button" aria-label="Volume down">
              <i class="fa-solid fa-minus"></i>
            </button>

            <button class="control-btn btn-mute" id="muteBtn" type="button" aria-label="Mute">
              mute
            </button>
          </div>

          <div class="side-wheel"></div>

          <audio id="audio" preload="metadata"></audio>
        </div>
      </div>
    </div>

    <section class="gradient">
      <h2>Gradient/archive section goes here next</h2>
    </section>
  </div>

  <script>
    const playlist = [
      { title: "TRACK ONE", artist: "ARTIST ONE", audio: "music/track-01.mp3" },
      { title: "TRACK TWO", artist: "ARTIST TWO", audio: "music/track-02.mp3" },
      { title: "TRACK THREE", artist: "ARTIST THREE", audio: "music/track-03.mp3" }
    ];

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const volUpBtn = document.getElementById("volUpBtn");
    const volDownBtn = document.getElementById("volDownBtn");
    const muteBtn = document.getElementById("muteBtn");

    const trackTitle = document.getElementById("trackTitle");
    const trackArtist = document.getElementById("trackArtist");
    const trackCount = document.getElementById("trackCount");
    const progressFill = document.getElementById("progressFill");
    const currentTime = document.getElementById("currentTime");
    const duration = document.getElementById("duration");

    const floatingPlayer = document.getElementById("floatingPlayer");
    const playerTilt = document.getElementById("playerTilt");

    let currentTrackIndex = 0;
    audio.volume = 0.7;

    function formatTime(time) {
      if (!isFinite(time)) return "0:00";
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins}:${secs.toString().padStart(2, "0")}`;
    }

    function updatePlayButton() {
      const icon = playBtn.querySelector("i");
      if (!icon) return;
      icon.className = audio.paused ? "fa-solid fa-play" : "fa-solid fa-pause";
    }

    function updateMuteButton() {
      muteBtn.textContent = audio.muted ? "sound" : "mute";
    }

    function loadTrack(index, autoplay = false) {
      currentTrackIndex = index;
      const track = playlist[currentTrackIndex];

      trackTitle.textContent = track.title;
      trackArtist.textContent = track.artist;
      trackCount.textContent = `${currentTrackIndex + 1}/${playlist.length}`;

      audio.src = track.audio;
      audio.load();

      currentTime.textContent = "0:00";
      duration.textContent = "0:00";
      progressFill.style.width = "0%";

      if (autoplay) {
        const p = audio.play();
        if (p) {
          p.then(() => {
            updatePlayButton();
          }).catch(() => {
            updatePlayButton();
          });
        }
      } else {
        updatePlayButton();
      }
    }

    playBtn.addEventListener("click", async () => {
      if (!audio.src) return;

      try {
        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (err) {
        console.error(err);
      }

      updatePlayButton();
    });

    prevBtn.addEventListener("click", () => {
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    nextBtn.addEventListener("click", () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    volUpBtn.addEventListener("click", () => {
      audio.volume = Math.min(1, +(audio.volume + 0.1).toFixed(2));
    });

    volDownBtn.addEventListener("click", () => {
      audio.volume = Math.max(0, +(audio.volume - 0.1).toFixed(2));
    });

    muteBtn.addEventListener("click", () => {
      audio.muted = !audio.muted;
      updateMuteButton();
    });

    audio.addEventListener("loadedmetadata", () => {
      duration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      currentTime.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener("play", updatePlayButton);
    audio.addEventListener("pause", updatePlayButton);

    audio.addEventListener("ended", () => {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex, true);
    });

    function handleTilt(event) {
      const rect = floatingPlayer.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) - 0.5;
      const y = ((event.clientY - rect.top) / rect.height) - 0.5;

      const rotateY = x * 10;
      const rotateX = y * -8;

      playerTilt.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    }

    function resetTilt() {
      playerTilt.style.transform = "rotateX(0deg) rotateY(0deg)";
    }

    if (window.matchMedia("(pointer:fine)").matches) {
      floatingPlayer.addEventListener("mousemove", handleTilt);
      floatingPlayer.addEventListener("mouseleave", resetTilt);
    }

    updateMuteButton();
    loadTrack(0, false);
  </script>
</body>
</html>
