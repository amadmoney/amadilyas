<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>enter archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
	* {
	  box-sizing: border-box;
	}

	html,
	body {
	  margin: 0;
	  padding: 0;
	  min-height: 100%;
	  background: #000;
	}

	body {
	  font-family: Arial, Helvetica, sans-serif;
	  color: #fff;
	  overflow: hidden;
	  position: relative;
	}

	body::before {
	  content: "";
	  position: fixed;
	  inset: 0;
	  pointer-events: none;
	  z-index: 0;
	  background:
		radial-gradient(circle at 18% 22%, rgba(255,255,255,0.16) 0 1px, transparent 2px),
		radial-gradient(circle at 72% 18%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
		radial-gradient(circle at 82% 72%, rgba(255,255,255,0.14) 0 1.2px, transparent 2px),
		radial-gradient(circle at 28% 78%, rgba(255,255,255,0.1) 0 1px, transparent 2px),
		radial-gradient(circle at 52% 48%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
		radial-gradient(circle at center, rgba(81, 122, 255, 0.08), rgba(0,0,0,0) 48%),
		radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(0,0,0,0) 62%);
	  background-size:
		320px 320px,
		420px 420px,
		520px 520px,
		620px 620px,
		760px 760px,
		cover,
		cover;
	  opacity: 0.9;
	}

	body::after {
	  content: "";
	  position: fixed;
	  inset: 0;
	  pointer-events: none;
	  z-index: 3;
	  opacity: 0.26;
	  background:
		repeating-linear-gradient(
		  to bottom,
		  rgba(255,255,255,0.08) 0px,
		  rgba(255,255,255,0.08) 1px,
		  rgba(0,0,0,0.28) 2px,
		  rgba(0,0,0,0.28) 4px
		);
	  mix-blend-mode: screen;
	}

	.splash-wrap {
	  position: relative;
	  z-index: 2;
	  min-height: 100vh;
	  display: grid;
	  place-items: center;
	  padding: 24px;
	}

	.splash-panel {
	  position: relative;
	  width: min(760px, 100%);
	  padding: 48px 32px 34px;
	  border: 1px solid rgba(255,255,255,0.18);
	  background:
		linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
		rgba(0,0,0,0.56);
	  backdrop-filter: blur(8px);
	  -webkit-backdrop-filter: blur(8px);
	  box-shadow:
		inset 0 1px 0 rgba(255,255,255,0.15),
		0 0 30px rgba(255,255,255,0.05),
		0 0 120px rgba(72, 109, 255, 0.07);
	  overflow: hidden;
	}

	.splash-panel::before {
	  content: "";
	  position: absolute;
	  inset: 0;
	  pointer-events: none;
	  background:
		radial-gradient(circle at top center, rgba(255,255,255,0.12), transparent 46%),
		linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
	  opacity: 0.7;
	}

	.splash-kicker {
	  margin: 0 0 18px;
	  font-family: "Press Start 2P", monospace;
	  font-size: clamp(9px, 1.2vw, 11px);
	  line-height: 1.8;
	  letter-spacing: 0.28em;
	  text-transform: uppercase;
	  color: rgba(255,255,255,0.72);
	  text-align: center;
	}

	.splash-title {
	  margin: 0;
	  text-align: center;
	  text-transform: uppercase;
	  font-size: clamp(30px, 6vw, 76px);
	  line-height: 1.05;
	  letter-spacing: 0.42em;
	  text-indent: 0.42em;
	  font-weight: 300;
	  color: #fff;
	  text-shadow:
		0 0 4px rgba(255,255,255,0.95),
		0 0 12px rgba(255,255,255,0.48),
		0 0 24px rgba(120,140,255,0.16);
	  animation: titleFlicker 4.4s infinite ease-in-out;
	}

	.splash-sub {
	  margin: 22px auto 0;
	  max-width: 560px;
	  text-align: center;
	  text-transform: uppercase;
	  font-size: clamp(10px, 1.4vw, 14px);
	  line-height: 1.9;
	  letter-spacing: 0.34em;
	  color: rgba(255,255,255,0.78);
	}

	.splash-status {
	  margin: 34px auto 0;
	  width: min(430px, 100%);
	  display: flex;
	  flex-direction: column;
	  gap: 10px;
	  align-items: center;
	}

	.status-line {
	  font-family: "Press Start 2P", monospace;
	  font-size: 9px;
	  line-height: 1.8;
	  letter-spacing: 0.16em;
	  text-transform: uppercase;
	  color: rgba(196, 214, 255, 0.88);
	  text-align: center;
	  min-height: 18px;
	}

	.status-bar {
	  position: relative;
	  width: 100%;
	  height: 10px;
	  border: 1px solid rgba(255,255,255,0.28);
	  background: rgba(255,255,255,0.06);
	  overflow: hidden;
	  box-shadow:
		inset 0 0 12px rgba(255,255,255,0.05),
		0 0 12px rgba(255,255,255,0.04);
	}

	.status-bar-fill {
	  width: 0%;
	  height: 100%;
	  background:
		linear-gradient(90deg,
		  rgba(255,255,255,0.18) 0%,
		  rgba(255,255,255,0.92) 50%,
		  rgba(180,205,255,0.72) 100%);
	  box-shadow:
		0 0 14px rgba(255,255,255,0.4),
		0 0 22px rgba(130,160,255,0.14);
	  animation: loadBar 3.8s cubic-bezier(.2,.8,.2,1) forwards;
	}

	.splash-actions {
	  display: flex;
	  justify-content: center;
	  margin-top: 34px;
	}

	.enter-btn {
	  appearance: none;
	  border: 1px solid rgba(255,255,255,0.32);
	  background:
		linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
	  color: #fff;
	  text-decoration: none;
	  text-transform: uppercase;
	  letter-spacing: 0.34em;
	  text-indent: 0.34em;
	  font-size: 12px;
	  padding: 16px 22px;
	  min-width: 240px;
	  text-align: center;
	  box-shadow:
		inset 0 1px 0 rgba(255,255,255,0.2),
		0 0 18px rgba(255,255,255,0.06);
	  transition:
		transform 180ms ease,
		box-shadow 180ms ease,
		background 180ms ease,
		border-color 180ms ease;
	}

	.enter-btn:hover {
	  transform: translateY(-2px);
	  border-color: rgba(255,255,255,0.48);
	  background:
		linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.08));
	  box-shadow:
		inset 0 1px 0 rgba(255,255,255,0.24),
		0 0 22px rgba(255,255,255,0.08),
		0 0 40px rgba(120,140,255,0.08);
	}

	.enter-btn:active {
	  transform: translateY(0);
	}

	.corner-readout {
	  position: fixed;
	  bottom: 14px;
	  left: 16px;
	  z-index: 4;
	  font-family: "Press Start 2P", monospace;
	  font-size: 8px;
	  line-height: 1.7;
	  letter-spacing: 0.14em;
	  text-transform: uppercase;
	  color: rgba(255,255,255,0.46);
	  pointer-events: none;
	}

	@keyframes titleFlicker {
	  0%, 18%, 22%, 36%, 58%, 100% {
		opacity: 1;
		filter: brightness(1);
	  }
	  19% {
		opacity: 0.9;
		filter: brightness(1.08);
	  }
	  20% {
		opacity: 0.78;
		filter: brightness(0.92);
	  }
	  21% {
		opacity: 1;
		filter: brightness(1.1);
	  }
	  59% {
		opacity: 0.86;
	  }
	  60% {
		opacity: 1;
	  }
	}

	@keyframes loadBar {
	  0% {
		width: 0%;
	  }
	  18% {
		width: 18%;
	  }
	  52% {
		width: 54%;
	  }
	  78% {
		width: 82%;
	  }
	  100% {
		width: 100%;
	  }
	}

	@media (max-width: 640px) {
	  .splash-panel {
		padding: 34px 18px 24px;
	  }

	  .splash-title {
		letter-spacing: 0.24em;
		text-indent: 0.24em;
	  }

	  .splash-sub {
		letter-spacing: 0.18em;
		line-height: 1.7;
	  }

	  .enter-btn {
		min-width: 100%;
		font-size: 11px;
		letter-spacing: 0.22em;
		text-indent: 0.22em;
	  }

	  .corner-readout {
		left: 10px;
		bottom: 10px;
		font-size: 7px;
	  }
	}
  </style>
</head>
<body>
  <div class="splash-wrap">
	<main class="splash-panel">
	  <p class="splash-kicker">incoming transmission / memory archive / signal unstable</p>

	  <h1 class="splash-title">archive<br>of amad</h1>

	  <p class="splash-sub">
		a drifting system of memory, image, sound, and leftover signal
	  </p>

	  <div class="splash-status">
		<div class="status-line" id="statusText">initialising archive field...</div>
		<div class="status-bar" aria-hidden="true">
		  <div class="status-bar-fill"></div>
		</div>
	  </div>

	  <div class="splash-actions">
		<a class="enter-btn" href="index.html">enter archive</a>
	  </div>
	</main>
  </div>

  <div class="corner-readout">
	node: 0001<br>
	signal: partial<br>
	status: awake
  </div>

  <script>
	const statusText = document.getElementById("statusText");

	const statusMessages = [
	  "initialising archive field...",
	  "mapping memory fragments...",
	  "stabilising signal drift...",
	  "opening entry point..."
	];

	let statusIndex = 0;

	const statusInterval = setInterval(() => {
	  statusIndex += 1;
	  if (statusIndex < statusMessages.length) {
		statusText.textContent = statusMessages[statusIndex];
	  } else {
		clearInterval(statusInterval);
	  }
	}, 900);

	// optional auto-enter later
	// setTimeout(() => {
	//   window.location.href = "index.html";
	// }, 4200);
  </script>
</body>
</html>
